name: Deploy to EC2 with Docker

on:
  push:
    branches:
      - 'dev'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build
        env:
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          EC2_HOST: ${{ secrets.EC2_HOST }}

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/your-app
          TAG=${{ github.sha }}
          docker build -t $IMAGE_NAME:$TAG .
          docker push $IMAGE_NAME:$TAG
        

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 환경 변수 설정
            export SPRING_DATASOURCE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}"
            export REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
            export JWT_ISSUER="${{ secrets.JWT_ISSUER }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export KAKAO_API_KEY="${{ secrets.KAKAO_API_KEY }}"
            export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
            # 최신 애플리케이션 컨테이너 가져오기
            docker pull ${{ secrets.DOCKER_USERNAME }}/your-app:${{ github.sha }}

            # 기존 컨테이너 중지 및 삭제
            docker stop my-app || true
            docker rm my-app || true

            # 새로운 컨테이너 실행
            docker run -d \
              -v /home/ubuntu/pinpoint/pinpoint-agent-3.0.0:/opt/pinpoint-agent \
              -e JAVA_OPTS="-javaagent:/opt/pinpoint-agent/pinpoint-bootstrap-3.0.0.jar \
              -Dpinpoint.agentId=friendchiseAgent1 \
              -Dpinpoint.applicationName=friendchise \
              -Dpinpoint.collector.ip=${{ secrets.COLLECTOR_IP }}" \
              --name my-app \
              -e SPRING_DATASOURCE_URL=jdbc:mysql://database-1.chgq0y8mip6h.ap-northeast-2.rds.amazonaws.com:3306/mydb \
              -e SPRING_DATASOURCE_USERNAME=root \
              -e SPRING_DATASOURCE_PASSWORD=$SPRING_DATASOURCE_PASSWORD \
              -e REDIS_PASSWORD=$REDIS_PASSWORD \
              -e JWT_ISSUER=$JWT_ISSUER \
              -e JWT_SECRET=$JWT_SECRET \
              -e KAKAO_API_KEY=$KAKAO_API_KEY \
              -e OPENAI_API_KEY=$OPENAI_API_KEY \
              -p 8080:8080 \
              ${{ secrets.DOCKER_USERNAME }}/your-app:${{ github.sha }}
