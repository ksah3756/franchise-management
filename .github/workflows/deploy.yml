name: Deploy to EC2 with Docker

on:
  push:
    branches:
      - 'dev'
      - 'refactor/architecture'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4.2.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build
        env:
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          EC2_HOST: ${{ secrets.EC2_HOST }}

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
            IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/friendchise
            TAG=${{ github.sha }}
            docker build -t $IMAGE_NAME:$TAG .
            docker push $IMAGE_NAME:$TAG
      

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 환경 변수 설정
            export DATASOURCE_URL="${{ secrets.DATASOURCE_URL }}"
            export SPRING_DATASOURCE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}"
            export REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
            export JWT_ISSUER="${{ secrets.JWT_ISSUER }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export KAKAO_API_KEY="${{ secrets.KAKAO_API_KEY }}"
            export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
            # 최신 애플리케이션 컨테이너 가져오기
            docker pull ${{ secrets.DOCKER_USERNAME }}/friendchise:${{ github.sha }}

            # 기존 컨테이너 중지 및 삭제
            docker stop friendchise || true
            docker rm friendchise || true

            # 새로운 컨테이너 실행
            docker run -d \
              --name friendchise \
              -e SPRING_DATASOURCE_URL=$DATASOURCE_URL \
              -e SPRING_DATASOURCE_USERNAME=admin \
              -e SPRING_DATASOURCE_PASSWORD=$SPRING_DATASOURCE_PASSWORD \
              -e REDIS_PASSWORD=$REDIS_PASSWORD \
              -e JWT_ISSUER=$JWT_ISSUER \
              -e JWT_SECRET=$JWT_SECRET \
              -e KAKAO_API_KEY=$KAKAO_API_KEY \
              -e OPENAI_API_KEY=$OPENAI_API_KEY \
              -p 8080:8080 \
              ${{ secrets.DOCKER_USERNAME }}/friendchise:${{ github.sha }}
