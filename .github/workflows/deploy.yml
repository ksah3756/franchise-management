name: Deploy to AWS CodeDeploy

on:
  push:
    branches:
      - 'dev'
      - 'refactor/architecture'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build
        env:
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          DATASOURCE_URL: ${{ secrets.DATASOURCE_URL }}
          DATASOURCE_PASSWORD: ${{ secrets.DATASOURCE_PASSWORD }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: build docker file and setting deploy file
        env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY: friendchise-origin
            IMAGE_TAG: ${{ github.sha }}
        run: | ## ECR에 이미지를 빌드하고 푸시하는 과정
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          mkdir -p scripts
          cat > scripts/deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          echo "Logging in to ECR..."
          aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 381492107741.dkr.ecr.ap-northeast-2.amazonaws.com
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)" 
          docker-compose -f "$DIR/docker-compose.yml" down || true
          docker-compose -f "$DIR/docker-compose.yml" up -d
          EOF
          cat > scripts/.env << EOF
          ECR_REGISTRY=$ECR_REGISTRY
          ECR_REPOSITORY=friendchise-origin
          IMAGE_TAG=$IMAGE_TAG
          REDIS_PASSWORD=$REDIS_PASSWORD
          DATASOURCE_URL=$DATASOURCE_URL
          DATASOURCE_PASSWORD=$DATASOURCE_PASSWORD
          JWT_ISSUER=$JWT_ISSUER
          JWT_SECRET=$JWT_SECRET
          KAKAO_API_KEY=$KAKAO_API_KEY
          OPENAI_API_KEY=$OPENAI_API_KEY
          EOF
          chmod +x scripts/deploy.sh
      - name: upload to s3
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          mv docker-compose.yml scripts/
          zip -r deploy-$IMAGE_TAG.zip ./scripts appspec.yml docker-compose.yml .env
          aws s3 cp --region ap-northeast-2 --acl private ./deploy-$IMAGE_TAG.zip s3://friendchisebucket
      - name: start deploy
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws deploy create-deployment --application-name deploy \
          --deployment-config-name CodeDeployDefault.OneAtATime \
          --deployment-group-name deploy-group \
          --s3-location bucket=friendchisebucket,bundleType=zip,key=deploy-$IMAGE_TAG.zip